name: Secret scan

# The planning docs are public — this guards against a secret (credential,
# token, server IP in an example) slipping into a markdown file. Runs on every
# push to main + every PR. (No build/test/style CI here: this repo is docs only.)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
